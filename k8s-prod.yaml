apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-demo
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-demo
  template:
    metadata:
      labels:
        app: jenkins-demo
    spec:
      imagePullSecrets:
      - name: registry-pull-secret
      containers:
      - image: 192.168.5.203/jenkins-demo/jenkins-demo:<BUILD_TAG>
        imagePullPolicy: IfNotPresent
        name: jenkins-demo
        ports:
        - containerPort: 8082
        
---
apiVersion: v1
kind: Service
metadata:
  name: jenkins-demo
  namespace: production
spec:
  selector:
    app: jenkins-demo
  ports:
  - port: 8082
    targetPort: 8082
  type: NodePort
